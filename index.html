// OCTTO — Shared iconography + visual components (ES)

const scrollTo = (id) => {
  if (!id || id === '#') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  const el = document.querySelector(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

const Nav = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [solucionesOpen, setSolucionesOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setSolucionesOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const linkStyle = { color: 'var(--text-dim)', textDecoration: 'none', fontSize: 14, fontWeight: 500, transition: 'color .2s' };

  const soluciones = [

    { emoji: '💳', label: 'Fidelización', desc: 'Tarjetas Wallet + geo-marketing', href: '#fidelizacion', accent: true },
    { emoji: '🤖', label: 'Inteligencia IA', desc: 'Agentes, chatbot y automatización', href: '#ai' },
    { emoji: '🔗', label: 'Integraciones', desc: 'DIAN, Wallets, pasarelas y más', href: '#integrations' },
  ];

  const handleNavClick = (e, href) => {
    e.preventDefault();
    setSolucionesOpen(false);
    scrollTo(href);
  };

  return (
    <nav style={{
      position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
      zIndex: 50, width: 'calc(100% - 32px)', maxWidth: 1200,
      padding: '12px 18px',

      border: '1px solid var(--line)',
      backdropFilter: 'blur(18px) saturate(1.4)',

      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      transition: 'background .3s',

      <Logo size={22} />
      <div style={{ display: 'flex', gap: 28, alignItems: 'center' }} className="nav-links">
        <a href="#platform" onClick={e => { e.preventDefault(); scrollTo('#platform'); }} style={linkStyle}>Plataforma</a>
        <a href="#ai" onClick={e => { e.preventDefault(); scrollTo('#ai'); }} style={linkStyle}>IA</a>

        {/* Soluciones dropdown */}
        <div ref={ref} style={{ position: 'relative' }}>
          <button
            onClick={() => setSolucionesOpen(v => !v)}
            style={{ ...linkStyle, background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, padding: 0 }}
          >
            Soluciones
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ transition: 'transform .2s', transform: solucionesOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}>
              <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </button>

          {solucionesOpen && (
            <div style={{
              position: 'fixed', top: 72, left: '50%', transform: 'translateX(-50%)',
              background: 'rgba(11,15,26,0.98)', border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 16, padding: 8, minWidth: 260, zIndex: 999,
              backdropFilter: 'blur(20px)', boxShadow: '0 24px 60px rgba(0,0,0,0.5)',
              animation: 'fadeIn .15s ease'
            }}>
              {soluciones.map(s => (
                <a key={s.label} href={s.href} onClick={e => handleNavClick(e, s.href)} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px',
                  borderRadius: 10, textDecoration: 'none',
                  background: s.accent ? 'rgba(99,102,241,0.1)' : 'transparent',
                  border: s.accent ? '1px solid rgba(99,102,241,0.2)' : '1px solid transparent',

                  onMouseLeave={e => { if (!s.accent) e.currentTarget.style.background = 'transparent'; }}

                  <span style={{ fontSize: 20 }}>{s.emoji}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: s.accent ? '#a5b4fc' : '#fff' }}>{s.label}</div>
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>{s.desc}</div>
                  </div>
                  {s.accent && <div style={{ marginLeft: 'auto', fontSize: 10, fontWeight: 700, letterSpacing: 1, color: '#6366f1', background: 'rgba(99,102,241,0.15)', padding: '2px 8px', borderRadius: 6 }}>NUEVO</div>}
                </a>

      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
      </div>
    </nav>

Object.assign(window, { Logo, Icon, Nav });

<script type="text/babel" data-from="components/hero.jsx">

const VIDEO_DEMO_URL = ''; // 👈 Pegá acá la URL del video (YouTube, Vimeo, etc.)

const VideoModal = ({ onClose }) => {
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);

  const embedUrl = (() => {
    if (!VIDEO_DEMO_URL) return '';
    const yt = VIDEO_DEMO_URL.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0`;
    const vm = VIDEO_DEMO_URL.match(/vimeo\.com\/(\d+)/);
    if (vm) return `https://player.vimeo.com/video/${vm[1]}?autoplay=1`;
    return VIDEO_DEMO_URL;
  })();

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 9999,
      background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',

              </div>
          }
        </div>
      </div>
    </div>
  );
};

const Sparkline = () => {
  const [data] = React.useState(() => {
    const pts = [];
    let y = 50;
    for (let i = 0; i < 40; i++) {
      y += (Math.random() - 0.4) * 8;
      y = Math.max(25, Math.min(85, y));
      pts.push(y);
    }
    return pts.map((v, i) => v - (i * 0.7));
  });
  const w = 100, h = 100;
  const pathD = data.map((y, i) => {
    const x = (i / (data.length - 1)) * w;
    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
  }).join(' ');
  const areaD = pathD + ` L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height: 180, display: 'block' }}>
      <defs>
        <linearGradient id="spark-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#7A5CFF" stopOpacity="0.5" />
          <stop offset="100%" stopColor="#7A5CFF" stopOpacity="0" />
        </linearGradient>
        <linearGradient id="spark-stroke" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#7A5CFF" />
          <stop offset="100%" stopColor="#F5B841" />
        </linearGradient>
      </defs>
      <path d={areaD} fill="url(#spark-fill)" />
      <path d={pathD} stroke="url(#spark-stroke)" strokeWidth="1.2" fill="none" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={w} cy={data[data.length - 1]} r="1.6" fill="#F5B841" />
      <circle cx={w} cy={data[data.length - 1]} r="3" fill="#F5B841" opacity="0.4" className="animate-pulse-glow" />
    </svg>
  );
};

const EcosystemHub = ({ modules, active, setActive }) => {
  const size = 520;
  const radius = 210;
  return (
    <div style={{ position: 'relative', width: '100%', maxWidth: size, margin: '0 auto', aspectRatio: '1/1' }}>

          <linearGradient id="hub-ring" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="var(--secondary)" stopOpacity="0.6" />
            <stop offset="50%" stopColor="var(--primary)" stopOpacity="0.15" />
            <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.3" />

        </defs>
        <g className="animate-spin-slow" style={{ transformOrigin: 'center' }}>
          <circle cx={size/2} cy={size/2} r={radius + 30} fill="none" stroke="url(#hub-ring)" strokeWidth="1" strokeDasharray="2 4" />
        </g>
        <circle cx={size/2} cy={size/2} r={radius - 10} fill="none" stroke="var(--line)" strokeWidth="1" strokeDasharray="4 6" />
        <circle cx={size/2} cy={size/2} r={110} fill="none" stroke="rgba(122,92,255,0.25)" strokeWidth="1" />

        {modules.map((m, i) => {
          const angle = (i / modules.length) * Math.PI * 2 - Math.PI / 2;
          const x = size/2 + Math.cos(angle) * radius;
          const y = size/2 + Math.sin(angle) * radius;
          return (
            <line
              key={i}
              x1={size/2} y1={size/2} x2={x} y2={y}
              stroke={active === i ? 'var(--secondary)' : 'rgba(122,92,255,0.22)'}
              strokeWidth={active === i ? 1.5 : 1}
              strokeDasharray={active === i ? 'none' : '3 4'}
              style={{ transition: 'all .3s' }}
            />
          );
        })}
      </svg>

      <div style={{
        position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
        width: 240, height: 240, borderRadius: '50%',

      </div>

      {modules.map((m, i) => {
        const angle = (i / modules.length) * Math.PI * 2 - Math.PI / 2;
        const x = 50 + Math.cos(angle) * (radius / size * 100);
        const y = 50 + Math.sin(angle) * (radius / size * 100);
        const isActive = active === i;
        return (
          <div

              position: 'absolute',

    </div>
  );
};

  "accent": "#F5B841",
  "bg": "#0B0F1A",
  "glowIntensity": 1.8,
  "gridPattern": true,
  "heroTagline": "Your business, running on autopilot."
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const setTweak = (key, value) => setTweaks(t => ({ ...t, [key]: value }));

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--primary', tweaks.primary);
    r.style.setProperty('--secondary', tweaks.secondary);
    r.style.setProperty('--accent', tweaks.accent);
    r.style.setProperty('--bg', tweaks.bg);
    const gi = tweaks.glowIntensity;
    const toHex = n => Math.max(0, Math.min(255, Math.floor(n))).toString(16).padStart(2, '0');
    r.style.setProperty('--glow-primary', tweaks.primary + toHex(128 * gi));
    r.style.setProperty('--glow-secondary', tweaks.secondary + toHex(112 * gi));
  }, [tweaks]);

  return (
    <>
      <Nav />
      <Hero />
      <ProblemSection />
      <SolutionSection />
      <ServicesSection />
      <AccountingSection />
      <EcosystemSection />
      <ComparisonSection />
      <HowItWorksSection />
      <AIFeaturesSection />
      <BenefitsSection />
      <IndustriesSection />
      <IntegrationsSection />
      <FidelizacionPage />
      <PricingSection />
      <FAQSection />
      <CTASection />
      <Footer />

      {typeof TweaksPanel !== 'undefined' && (
        <TweaksPanel>
          <TweakSection label="Colores de marca">
            <TweakColor label="Primario (morado)" value={tweaks.primary} onChange={v => setTweak('primary', v)} />
            <TweakColor label="Secundario (morado neón)" value={tweaks.secondary} onChange={v => setTweak('secondary', v)} />
            <TweakColor label="Acento (dorado)" value={tweaks.accent} onChange={v => setTweak('accent', v)} />
            <TweakColor label="Fondo" value={tweaks.bg} onChange={v => setTweak('bg', v)} />
          </TweakSection>
          <TweakSection label="Atmósfera">
            <TweakSlider label="Intensidad del brillo" value={tweaks.glowIntensity} min={0} max={2} step={0.1} onChange={v => setTweak('glowIntensity', v)} />
          </TweakSection>
        </TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
